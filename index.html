<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Full-screen Canvas Line</title>
  <style>
    html, body { height: 100%; margin: 0; }
    canvas { display: block; width: 100%; height: 100%; }

    :root {
      --ui-bg-color: #eee;
      --ui-bg-color-hover: #ddd;

      --ui-text-color: #333;
      --ui-text-color-hover: #111;

      --ui-font-size-small: 15px;
      --ui-font-size-medium: 20px;
      --ui-font-family-normal: Tahoma, Geneva, Verdana, sans-serif;

      --ui-button-color: #eee;
      --ui-button-border-radius: 8px;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
    }

    #stats {
      position: fixed;
      bottom: 20px;
      left: 20px;
      display: flex;
      gap: 10px;
      border: none;
      padding: 10px 15px;
      border-radius: var(--ui-button-border-radius);
      background-color: var(--ui-bg-color);
      color: var(--ui-text-color);
      font-size: var(--ui-font-size-small);
      font-family: var(--ui-font-family-normal);
    }

    button {
      font-size: var(--ui-font-size-medium);
      padding: 10px 15px;
      border: none;
      border-radius: var(--ui-button-border-radius);
      background-color: var(--ui-button-color);
      color: var(--ui-text-color);
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: var(--ui-bg-color-hover);
    }

    #equationBox {
      position: fixed;
      top: 0px;
      left: 0;
      width: 300px;
      height: 100%;
      background: var(--ui-bg-color);
      color: var(--ui-text-color);
      padding: 10px;
      overflow-y: auto;
      transform: translateX(0%);
      transition: transform 0.3s;
      outline: solid;
      outline-width: 2px;
    }

    #equationBox.open {
      transform: translateX(0);
    }

    #equationBox h1 {
      user-select: none;
    }

    #equationPanel {
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .equationRow {
      width: auto;
      min-height: 45px;
      margin-left: 5px;
      margin-right: 5px;
      margin-top: 2px;
      outline: solid;
      display: flex;
      flex-direction: row;
    } 

    .equationEdit {
      outline: solid;
      width: 40px;
      min-width: 40px;
    }

    .equationEdit button {
      margin: -5px;
      width: 30px;
      height: 30px;
      border-radius: 15px;
      position: relative;
      margin-top: 50%; 
      margin-left: 50%; 
      transform: translate(-50%, -50%);
      outline: solid;
    }

    .equationWrapper {
      font-size: 110%;
      margin-top: auto;
      margin-bottom: 6px;
      margin-left: 15px;
      margin-right: 15px;
      padding-top: 12px;
      vertical-align: baseline;
    }

    .equationResult {
      position: relative;
      right: 0;
      margin-top: 2px;
      max-width: 218px;
      overflow: visible;
    }

    .equation {
      min-width: 218px;
      max-width: 218px;
      border-bottom: 0;
      overflow: hidden;
    }

    #equationBox button {
      font-family: serif;
    }

    #equationBox h1 {
      margin-top: 0;
      text-align: center;
      font-family: serif;
    }

    #toggleBox {
      position: fixed;
      top: 22px;
      left: 0;
      padding: 5px 10px;
      background: #333;
      color: white;
      cursor: pointer;
      border-radius: 0 4px 4px 0;
    }

    function generateStaticMath(element){
      var elementStaticMath = MQ.StaticMath(element);
      return elementStaticMath;
    }

    function generateMathField(eq){
      var eqMathField = MQ.MathField(eq, {
        handlers: {
          edit: async function() {
            var enteredMath = eqMathField?.latex();
            if(enteredMath !== undefined) await checkAnswer(enteredMath, eq);
          },
          enter: function() {
            //HACK
            let eqRow = eq.parentElement.parentElement;
            
            //console.log('inserting after',eq);
            let eqNew = insertBlankExpression(eqRow);
            eqNew.focus();
          },
          deleteOutOf: function() {
            var enteredMath = eqMathField?.latex();
            if(enteredMath === undefined){

            }

            console.log('deleted ex len', enteredMath.length);

            if(enteredMath.length !== 0){

            if(getAllExpressions().length <= 1){

            }

            //HACK
            let eqRow = eq.parentElement.parentElement;

            removeExpression(eqRow);
          }
        }
      });

      return eqMathField;

    function newDivWithClass(name){
      let a = document.createElement('div');
      a.className = name;

    }

    async function checkAnswer(latex, eqSpan, canRecurse = true){
      //console.log('called on ', latex);
      console.assert(eqSpan.classList.contains(expMathPlaceholderClass));

      let test = null;
      try{
        test = tokenizeLatexExpression(latex);
      }catch(e){
        console.log(e);
      }

      if(test === null && canRecurse){
        update();
        return;
      }

      const eqRow = eqSpan.parentElement.parentElement;

      const wanted = parseInt(eqRow.id.slice(7));

      const expressions = getAllExpressions();
      const index = expressions.findIndex((ex) => ex.id === wanted);
      const old = expressions[index];

      if(old === undefined) {console.log('----- WEIRD -----',getAllExpressions()); return; }

      let compiled;

      try{
        compiled = compileExpression(test);
      }catch(e){
        console.warn("Invalid compiled expression");

        compiled = {
          id: old.id,
          type: -1,
          color: old.color,
          latex: latex,
          tokens: [],
          varDependencies: new Set()
        }
      }

      console.assert(old.varDependencies !== undefined);
      console.assert(compiled.varDependencies !== undefined);

      compiled.id = wanted;
      compiled.color = old.color; 
      compiled.latex = latex;

      expressions[index] = compiled;

      // if(compiled.type === -1) return;

      onExpressionChange(eqRow, compiled, old, canRecurse);

      update();
    }

    function onExpressionChange(eqRow, newExpr, oldExpr, canRecurse){
      //console.log('expression change to', newExpr.type);
      let wrapperElement = eqRow.childNodes[1]; //HACK

      if(oldExpr.type === 7){
        unregisterVariable(oldExpr.var);
      }

      if(newExpr.type === 7){
        //console.log('registering');

        const evalResult = evaluateExpression(newExpr);
        const value = evalResult.value;
        const unc = evalResult.uncertainty;

        console.assert(newExpr.var !== undefined);
        console.assert(newExpr.varDependencies !== undefined);

        if(registerVariable(newExpr.var, evalResult,newExpr.varDependencies)){
          //console.log('set var ', newExpr.var , ' to ', value);
        }else{
          console.log('failed to set var ', newExpr.var , ' to ', evalResult);
        }

        if(canRecurse){
          const expressions = getAllExpressions();

          expressions.forEach((exp) => {
            if(exp.id === newExpr.id) return;
            console.assert(exp.varDependencies !== undefined);


            console.log('exp: ', exp, 'vs', newExpr,'dependencies:', exp.varDependencies);
            if(exp.varDependencies.length === 0) return;

            if(exp.varDependencies.has(newExpr.var)){
              const depEqRow = document.getElementById(expRowId+exp.id);

              console.assert(depEqRow !== undefined);

              const depEqWrapper = depEqRow.childNodes[1];

              console.assert(depEqWrapper !== undefined);
              console.assert(depEqWrapper.childNodes.length > 0);

              const depEqSpanIndex = findIndexInNodeList(depEqWrapper.childNodes,(n) => n.classList.contains(expMathPlaceholderClass));
              console.assert(depEqSpanIndex >= 0);
              
              const spanElement = depEqWrapper.childNodes[depEqSpanIndex];
              //console.log(spanElement);

              checkAnswer(exp.latex,spanElement,false);
              //console.log('updated: ', exp.id);
            }
          })
        }
      }

      // if(!canRecurse){
      //   return;
      // }

      if(requiresExpressionResult(newExpr.type)){
        const index = findIndexInNodeList(
          wrapperElement.childNodes, 
          function (n) { 
            return n.classList.contains(expResultClass);
          }
        );
        const displayedResult = parseTokenToLatex(evaluateExpression(newExpr));
        //console.log(displayedResult);

        let result;
        let resultMathField;
        if(index === -1){
          //add new exp result element

          //console.log('new result');
          result = newDivWithClass(expResultClass);
          result.style.outline = 'solid';

          wrapperElement.appendChild(result);
          
          resultMathField = generateStaticMath(result,displayedResult); 
        }else{
          //replace current exp result element

          resultMathField = MQ(wrapperElement.childNodes[index]);
        }

        resultMathField.latex(displayedResult); //set to display result
      }else if(requiresExpressionResult(oldExpr.type)){
        //console.warn('finding index of', expResultClass, ' in ', wrapperElement.childNodes);
        const index = findIndexInNodeList(
          wrapperElement.childNodes, 
          function (n) { 
            //console.log(n.classList,expResultClass);
            return n.classList.contains(expResultClass);
          }
        );
        //console.log('doing???????');
        if(index === -1) return;

        //console.log('removing ', index,wrapperElement.childNodes.length, 'because ', oldExpr.type);
        wrapperElement.removeChild(wrapperElement.childNodes[index]);
      }
    }

    function findIndexInNodeList(nodeList, fn){
      //console.log(nodeList.values());
      let i = 0;
      for(const node of nodeList.values()){
        //console.warn(node,i);
        if(fn(node)) {
          return i;
        }
        i++;
      }
      return -1;
    }

    function requiresExpressionResult(type){
      return type === 0 || type === 7;
    }

    function parseTokenToLatex(token){
      const value = token.value;
      const uncertainty = token.uncertainty ?? 0;
      const asPercent = token.interpret === 'pct';

      if(isFinite(value)){
        const strUncertainty = uncertainty === 0 ? '' : '±'+(asPercent ? uncertainty*100+'%' : uncertainty);
        const strValue = (asPercent?value*100+'%':value);
        return '='+strValue+strUncertainty;
      }

      if(value === NaN){
        return '=\\operatorname{NaN}';
      }

      if(value === undefined){
        console.log('result: ', undefined);
        return '=\\operatorname{undefined}'
      }

      if(value === Infinity){
        return '=\\infty';
      }

      if(value === -Infinity){
        return '=-\\infty';
      }
    }

    function removeExpression(eqRow){
      console.log('removing row: ', eqRow);
      const equationList = document.getElementById('equationList');

      let wanted = parseInt(eqRow.id.slice(7));
      let expressions = getAllExpressions();
      let index = expressions.findIndex((ex) => ex.id === wanted);

      expressions.splice(index,1);

      equationList.removeChild(eqRow);
    }

    /**
     * Insert a new expression at the specified index
     * @param {number} index the index to be inserted after
     */
    function insertBlankExpression(eqRow, shouldFocus){
      const equationList = document.getElementById('equationList');

      let wanted = parseInt(eqRow.id.slice(7));
      let expressions = getAllExpressions();
      let index = expressions.findIndex((ex) => ex.id === wanted);

      let expression = {
        id: getNextId(),
        type: -1,
        color: getNextColor(),
        latex: '',
        tokens: [],
        varDependencies: new Set()
      };

      expressions.splice(index, 0, expression);

      let row = generateEquationRow(expression);

      console.log('before, after: ', eqRow, eqRow.nextElementSibling);

      equationList.insertBefore(row, eqRow.nextElementSibling);

      //HACK
      let field = MQ(row.childNodes[1].childNodes[0]);
      //console.log(field instanceof MQ.MathField, field);

      return field;
    }

    function update() {
      resize();
      draw();
      //console.log("curexp", currentExpression);
    }

    // Handle high-DPI screens and resizing so the line is crisp and always stretches corner-to-corner
    function resize() {
      const dpr = window.devicePixelRatio || 1;
      // set the internal pixel size
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      // keep CSS size as full window
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      // scale drawing operations so 1 unit = 1 CSS pixel
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function draw() {
        // clear
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // start timer
        var start = window.performance.now();

        drawGrid();

        getAllExpressions().forEach((expr) => {
          drawExpression(expr);
        });

        if(doQuadTooltip && quadSelected.length == 4){
          ctx.beginPath();
          ctx.strokeStyle = 'yellow';
          ctx.rect(...quadSelected);
          ctx.stroke();
        }

        // end timer
        var end = window.performance.now();
        var time = end - start;

        fpsDisplay.innerHTML = "FPS: " + Math.floor(1000/time);
    }

    function drawExpression(expr){
      if(expr === undefined || expr.type === -1){
        return;
      }

      switch(expr.type){
        case 1: //Implicit
          drawAsQuad(expr);
          break;
        case 2: //y=f(x)
          drawAsYofX(expr);
          break;
        case 3: //x=f(y)
          drawAsXofY(expr);
          break;
        case 9: //blank
          break;
        default:
          //drawAsQuad(expr);
          break;
      }
    }

    function toGraphCoordsX(x){
        return ((x-window.innerWidth/2)*(3/window.innerWidth)-offsetX)*scaleFactor;
    }

    function toGraphCoordsY(y){
        return -((y-window.innerHeight/2)*(3/window.innerWidth)-offsetY)*scaleFactor;
    }

    function toScreenCoordsX(x) {
        return ((x/scaleFactor)+offsetX)*(window.innerWidth/3)+window.innerWidth/2;
    }

    function toScreenCoordsY(y) {
        return (-(y/scaleFactor)+offsetY)*(window.innerWidth/3)+window.innerHeight/2;
    }

    function evaluateQuad(quad){
        if(currentExpression == null || currentExpression == undefined){
            console.log("null quad");
            return;
        }

        if(currentExpression.replace == undefined){
            console.log("invalid replace data");
            return;
        }

        let x1 = toGraphCoordsX(quad.minX);
        let x2 = toGraphCoordsX(quad.maxX);
        let y1 = toGraphCoordsY(quad.minY);
        let y2 = toGraphCoordsY(quad.maxY);

        //console.log(currentExpression);

        //let exprs = getCompiledExpressions();
        //console.log(exprs);
        return evaluateExpression(
            currentExpression, 
            {
                minX: x1,
                maxX: x2,
                minY: y2,
                maxY: y1, //TODO: HACK. y1 & y2 are flipped, because screen y is flipped from graph y
            },
            {evaluateDiff: true}
        );

    }

    function drawAsQuad(expr){
      currentExpression = expr; //replace later with the rect() functions actually taking an expression as input?

      quadCount = 0;
      quadOn = 0;
      quadStack = [];
      renderStack = [];

      pushRect(0,0,window.innerWidth,window.innerHeight, false, true);

      while(quadCount < maxQuads && quadOn < quadStack.length){
        if(tryDrawRect(...quadStack[quadOn])){
          renderStack.push(quadStack[quadOn]);
        }
        quadOn++;
      }

      for(let i = quadOn; i<quadStack.length; i++){
        renderStack.push(quadStack[i]);
      }

      renderStack.forEach((q) => {
        tryPlotRect(q[0], q[1], q[2], q[3], true, true);
      });
    }

    function drawAsYofX(expr){
      currentExpression = expr;

      const dx = 1/2;
      const minY = toGraphCoordsY(0);
      const maxY = toGraphCoordsY(window.innerHeight);

      ctx.beginPath();
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = currentExpression.color; //FIX to not rely on currentExpression variable

      let gy = evaluateExpression(
        currentExpression, 
        {min: toGraphCoordsX(-dx), max: toGraphCoordsX(0)}
      );
      ctx.moveTo(0,toScreenCoordsY(gy.value[1]));

      segmentCount = 0;

      let px = 0; //previous x
      for(let x=dx; x<window.innerWidth; x+= dx){
        trySegYofX(px, x, 0, segmentCount < maxSegments);

        px = x;
      }

      ctx.stroke();
    }

    function PZ(e){
      if(e===0||isNaN(e)) return e;
      if(!isFinite(e))return NaN;
      if(e===Math.floor(e)) 
          return e > 0 ? 0 : -0; //sign of e
      let t = Math.round(2 * e), //double the number, then round that
          r = -0.5 * t + e, //num - (num rounded to nearest half)
          n = t & 2 ? -1 : 1, //if t is even, -1, else 1
          o = t & 1 ? Math.cos(Math.PI*r) : Math.sin(Math.PI*r); //if t is odd: cos, else sin
      return n*o
    }

    function trySegYofX(lx, rx, depth, allowSubdivision){
      segmentCount++;

      // const x1=toGraphCoordsX(lx), x2=toGraphCoordsX(rx);

      // const n = Math.abs(
      //   Math.floor(x1/Math.PI + 0.5)
      //   -Math.floor(x2/Math.PI + 0.5)
      // );

      // const result = {type: 12, value: [Math.tan(x1), Math.tan(x2)], edge: [0,n,n]};

      const result = evaluateExpression(currentExpression, {
        min: toGraphCoordsX(lx), max: toGraphCoordsX(rx)
      });

      // if(!isFinite(result.value[1])){
      //   moveTo(rx,
      //     window.innerHeight*(Math.sign(result.value[1])+1)
      //   );
      //   return;
      // }

      let y = toScreenCoordsY(result.value[1]);

      if(y < 0) y = -window.innerHeight;
      else if (y > window.innerHeight) y = 2*window.innerHeight;

      const s = getRenderState(
        result.edge, 
        allowSubdivision && segmentCount < maxSegments
      );

      if(s === 1){
        const m = (lx+rx)/2;

        trySegYofX(lx,m,depth+1, depth <= maxDepth);
        trySegYofX(m,rx,depth+1, depth <= maxDepth);
      }else if (s === 0){
        //only works because regardless of recursions, segments are evaluated left to right
        ctx.lineTo(rx, y);
      }else{
        // TODO: asymptote detection?
        ctx.moveTo(rx, y);
      }
    }

    function drawAsXofY(expr){
      currentExpression = expr;

      const dy = 1;
      const minX = toGraphCoordsX(0);
      const maxX = toGraphCoordsX(window.innerWidth);

      ctx.beginPath();
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = currentExpression.color; //r 3,4,5,6

      let gx = evaluateExpression(
        currentExpression, 
        { min: toGraphCoordsY(window.innerHeight+dy), max: toGraphCoordsY(window.innerHeight) }
      );
      ctx.moveTo(toScreenCoordsX(gx.value[0] ?? gx.value), window.innerHeight);

      var py = window.innerHeight; // previous y
      var px = toScreenCoordsX(gx.value[0] ?? gx.value);
      for(let y=window.innerHeight-dy; y>0; y -= dy){
        let gx = evaluateExpression(
          currentExpression, 
          { min: toGraphCoordsY(py), max: toGraphCoordsY(y) }
        );

        let x = toScreenCoordsX(gx.value[0] ?? gx.value);

        if(Math.log10(Math.abs(window.innerWidth/2-x)) > 3){
          if(x>window.innerWidth/2){
            ctx.moveTo(window.innerWidth,y)
          }else{
            ctx.moveTo(0,y)
          }
          
        }else{
          ctx.lineTo(x,y)
        }

        //console.log(gy.value[0]);

        //ctx.lineTo(toScreenCoordsX(gx.value[0] ?? gx.value),y)

        // TODO: implement variable quad density, like implicit graph
        // tryPlotRect(x,0,dx,window.innerHeight,true,true);

        py -= dy;
        px = x;
      }

      ctx.stroke();
    }

    function getRenderState(edge, allowSubdivision = true){

      if(allowSubdivision){
        if(edge[1] > 0 || edge[2] > 0){
          return 1;
        }

        return 0;
      }

      if(edge[1] == 0 && edge[2] == 0){
        return 0;
      }

      return -1;
    }

    function pushSeg(t1,t2){
      segmentEvalStack.push([t1,t2]);
      segmentCount++;
    }

    function tryDrawSeg(t1,t2,type){
      if(currentExpression == undefined){
        return false;
      }

      const result = tryPlotSeg(t1,t2,type);
    }

    function pushRect(x,y,width,height, depth=0){
      quadStack.push([x,y,width,height,depth]);
      quadCount++;
    }

    function tryDrawRect(x,y,width,height,depth=0){
      if(currentExpression == null){
        return false;
      }

      //Assumption: quadCount should always be less than maxQuads
      if(depth<4){
        pushRect(x,y,width/2,height/2,depth+1);
        pushRect(x,y+height/2,width/2,height/2,depth+1);
        pushRect(x+width/2,y,width/2,height/2,depth+1);
        pushRect(x+width/2,y+height/2,width/2,height/2,depth+1);
        //quadCount+=4;
        return false;
      }

      //check if should be iterated on more, rendered normally, or not rendered
      const result = tryPlotRect(x,y,width,height,false,false);
      if(result == null){
        return false;
      }

      if(result && quadCount<maxQuads){
        //return true;
        //iterate further
        pushRect(x,y,width/2,height/2,depth+1);
        pushRect(x,y+height/2,width/2,height/2,depth+1);
        pushRect(x+width/2,y,width/2,height/2,depth+1);
        pushRect(x+width/2,y+height/2,width/2,height/2,depth+1);
        //quadCount+=4;
        return false;
      }

      //quadCount++;
      //can render this one as is
      return true;
    }

    // function drawRect(x, y, width, height, depth=0) {
      
    //     if(currentExpression == undefined){
    //       return false;
    //     }

    //     quadCount++;

    //     if(depth<4){
    //         pushRect(x,y,width/2,height/2,depth+1);
    //         pushRect(x,y+height/2,width/2,height/2,depth+1);
    //         pushRect(x+width/2,y,width/2,height/2,depth+1);
    //         pushRect(x+width/2,y+height/2,width/2,height/2,depth+1);
    //         quadCount--;
    //         return false; //don't render me
    //     }

    //     // if(width<6 || height<6){
    //     //     plotRect(x,y,width,height,true);
    //     //     //ctx.rect(x,y,width,height);
    //     //     //ctx.stroke();
    //     //     return;
    //     // }

    //     //r
    //     //true  -> iterate further
    //     //false -> render now
    //     //null  -> stop
    //     const r = plotRect(x,y,width,height, false) ?? false;

    //     if(r){
    //         pushRect(x,y,width/2,height/2,depth+1);
    //         pushRect(x,y+height/2,width/2,height/2,depth+1);
    //         pushRect(x+width/2,y,width/2,height/2,depth+1);
    //         pushRect(x+width/2,y+height/2,width/2,height/2,depth+1);
    //         quadCount--;
    //         return false; //don't render me
    //     }

    //     return true; //do render me

    //     //if undefined at all corners, draw
    //     //if ~linear, draw
    //     //something about f(x) passing through 0?

    //     //otherwise subdivide
    //     //ctx.rect(x,y,width,height);
    //     //ctx.stroke();

    //     //ctx.rect(x,y,width,height);
    //     //ctx.stroke();
    // }

    function tryPlotRect(x,y,w,h,forcePlot=false,doRender=true){
      const q = evaluateQuad({
          minX: x, maxX: x+w, 
          minY: y, maxY: y+h
      });

      if(q.type != 10 || currentExpression.type != 1){
        //console.log(q.value);
        return;
      }

      const v=q.value;

      if(
        ((q.edges.top[1] > 0) || 
        (q.edges.lft[1] > 0) ||
        (q.edges.rgt[1] > 0) ||
        (q.edges.btm[1] > 0)) && !forcePlot
      ){
        if(w > 12 && h > 12){
          //Attempt to iterate further
          return true;
        }else{
          return false;
        }
      }

      if(
        (q.edges.top[0] > 1) || 
        (q.edges.lft[0] > 1) ||
        (q.edges.rgt[0] > 1) ||
        (q.edges.btm[0] > 1)
      ){
        if(!forcePlot){
          //If possible, iterate further
          return true;
        }
        //Else continue as usual
      }

      const crossSum = 
        (q.edges.top[0]) +
        (q.edges.lft[0]) +
        (q.edges.rgt[0]) +
        (q.edges.btm[0]);

      const v00 = v[0]; //tplf
      const v10 = v[1]; //tprt
      const v01 = v[2]; //btlf
      const v11 = v[3]; //btrt

      if(!forcePlot){
        //check for if the quad is on/near f(x)=0
        //if so, iterate further

        const topDif = Math.abs(v00-v10)*Math.SQRT1_2;
        const rgtDif = Math.abs(v10-v11)*Math.SQRT1_2;
        const btmDif = Math.abs(v11-v01)*Math.SQRT1_2;
        const lftDif = Math.abs(v01-v00)*Math.SQRT1_2;

        if(Math.abs(v00)<lftDif || Math.abs(v00)<topDif){
          return true;
        }

        if(Math.abs(v10)<topDif || Math.abs(v10)<rgtDif){
          return true;
        }

        if(Math.abs(v11)<rgtDif || Math.abs(v11)<btmDif){
          return true;
        }

        if(Math.abs(v01)<btmDif || Math.abs(v01)<lftDif){
          return true;
        }
      }

      

      /*const linDif00 = Math.abs(v00/(scaleFactor*scaleFactor)*1.5/window.innerWidth);
      const linDif10 = Math.abs(v10/(scaleFactor*scaleFactor)*1.5/window.innerWidth);
      const linDif01 = Math.abs(v01/(scaleFactor*scaleFactor)*1.5/window.innerWidth);
      const linDif11 = Math.abs(v11/(scaleFactor*scaleFactor)*1.5/window.innerWidth);

      const m = w * 0.000001;
      if((linDif00 < m || linDif01 < m || linDif10 < m || linDif11 < m )&& !forcePlot){
        return true;
      }*/

      // Evaluate function at four corners
      //const v00 = evalAt(x,   y);     // top-left
      //const v10 = evalAt(x+w, y);     // top-right
      //const v01 = evalAt(x,   y+h);   // bottom-left
      //const v11 = evalAt(x+w, y+h);   // bottom-right

      //ideal process
      //evalAt is called once, and evaluates all four corners at once
      //detects discontinuities across each edge by managing each operation serarately
      //may also be faster to eval 4 values at once instead of each one individually

      if(
          v00 == undefined && 
          v01 == undefined && 
          v10 == undefined && 
          v11 == undefined 
      ){
          console.log("undefined");
          //don't render if is undefined
          return null;
      }

      //check if is far out of bounds (0-line does not come close to this box)
      //f(x) \neq 0


      /*
      let u = evalChangeAt(x+w/2,y+h/2);
      let a = Math.abs(evalChangeChangeAt(x+w/2,y+h/2));

      let t = w/200;
      let s = u*t+0.5*a*Math.pow(t,2);

      //s=ut+0.5at^2

      //decent detection of 0-line being out-of-bounds but doesn't do asymptotes well
      let max=Math.abs(s)*scaleFactor;
      
      if(
          (Math.abs(v00)>max ||
          Math.abs(v01)>max ||
          Math.abs(v10)>max ||
          Math.abs(v11)>max) &&
          a < 10
      ){
          return false;
      }*/


      // Determine binary state for each corner: 1 if positive, 0 if negative
      
      //console.log(v);

      if(!doRender){
        //render as usual, no further iteration
        return false;
      }
      
      const s00 = v00 > 0 ? 1 : 0; //tplf
      const s10 = v10 > 0 ? 1 : 0; //tprt
      const s01 = v01 > 0 ? 1 : 0; //btlf
      const s11 = v11 > 0 ? 1 : 0; //btrt

      // Build case index (top-left, top-right, bottom-right, bottom-left)
      const index = (s00 << 3) | (s10 << 2) | (s11 << 1) | s01;

      // if(crossSum>0 && (index == 0 || index == 16) && !forcePlot){
      //   console.log("0/16");
      //   return true;
      // }

      // For simplicity, compute intersections along edges (assuming linear variation)
      const interp = (a, b, va, vb) => {
          const t = va / (va - vb);
          return a + t * (b - a);
      };

      ctx.beginPath();
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = currentExpression.color; //r 3,4,5,6

      // Calculate intersections relative to translated square
      switch (index) {
        case 1: case 14:
          ctx.moveTo(x, interp(y + h, y, v01, v00));
          ctx.lineTo(interp(x, x + w, v01, v11), y + h);
          break;
        case 2: case 13:
          ctx.moveTo(interp(x, x + w, v01, v11), y + h);
          ctx.lineTo(x + w, interp(y + h, y, v11, v10));
          break;
        case 3: case 12:
          ctx.moveTo(x, interp(y + h, y, v01, v00));
          ctx.lineTo(x + w, interp(y + h, y, v11, v10));
          break;
        case 4: case 11:
          ctx.moveTo(x + w, interp(y + h, y, v11, v10));
          ctx.lineTo(interp(x, x + w, v00, v10), y);
          break;
        case 5: case 10:
          ctx.moveTo(x, interp(y + h, y, v01, v00));
          ctx.lineTo(interp(x, x + w, v00, v10), y);
          ctx.moveTo(interp(x, x + w, v01, v11), y + h);
          ctx.lineTo(x + w, interp(y + h, y, v11, v10));
          break;
        case 6: case 9:
          ctx.moveTo(interp(x, x + w, v00, v10), y);
          ctx.lineTo(interp(x, x + w, v01, v11), y + h);
          break;
        case 7: case 8:
          ctx.moveTo(interp(x, x + w, v00, v10), y);
          ctx.lineTo(x, interp(y + h, y, v01, v00));
          break;
        default:
          //console.log(index);
          break;
      }

      ctx.stroke();

      if(doQuadTooltip){
        //console.log(lastMouseX);
        if( x < lastMouseX && lastMouseX < x+w && y < lastMouseY && y+h>lastMouseY){
          quadSelected = [x,y,w,h];
        }
      }

      if(showQuadOutlines){
        ctx.beginPath();
        ctx.strokeStyle = 'lightgray';
        ctx.rect(x,y,w,h);
        ctx.stroke();
      }
      
    }

    function drawHorizontalGridline(y) {
      if(y < window.innerHeight && y>0){
          ctx.moveTo(0,y);
          ctx.lineTo(window.innerWidth,y);
      }
    }

    function drawVerticalGridline(x) {
        if(x < window.innerWidth && x>0){
            ctx.moveTo(x,0);
            ctx.lineTo(x,window.innerHeight);
        }
    }

    function majorGridScaleToNiceMultiple(scale){
        let scaleMagnitude = Math.log10(scale);
        let scaleToRoundedRatio = scale / Math.pow(10,Math.floor(scaleMagnitude));
        if(scaleToRoundedRatio > 5){
            //scalefactor is 5x more than floored magnitude
            //const minorGridScale = Math.pow(10, Math.floor(scaleMagnitude));
            return Math.pow(10, Math.floor(scaleMagnitude))*5;
        }

        if(scaleToRoundedRatio > 2){
            //const minorGridScale = Math.pow(10, Math.floor(scaleMagnitude))/2;
            return Math.pow(10, Math.floor(scaleMagnitude))*2;
        }

        //const minorGridScale = Math.pow(10, Math.floor(scaleMagnitude))/5;
        return Math.pow(10, Math.floor(scaleMagnitude));
    }

    function minorGridScaleToNiceMultiple(scale){
        let scaleMagnitude = Math.log10(scale);
        let scaleToRoundedRatio = scale / Math.pow(10,Math.floor(scaleMagnitude));
        if(scaleToRoundedRatio > 5){
            //scalefactor is 5x more than floored magnitude
            return Math.pow(10, Math.floor(scaleMagnitude));
            //return Math.pow(10, Math.floor(scaleMagnitude))*5;
        }

        if(scaleToRoundedRatio > 2){
            return Math.pow(10, Math.floor(scaleMagnitude))/2;
            //return Math.pow(10, Math.floor(scaleMagnitude))*2;
        }

        return Math.pow(10, Math.floor(scaleMagnitude))/5;
        //return Math.pow(10, Math.floor(scaleMagnitude));
    }

    function drawGrid() {

        ctx.lineWidth = 1;
        ctx.strokeStyle = "#ccc";

        //Find visible graph coordinate bounds
        const graphLeft   = toGraphCoordsX(0);
        const graphRight  = toGraphCoordsX(window.innerWidth);
        const graphTop    = toGraphCoordsY(0);
        const graphBottom = toGraphCoordsY(window.innerHeight);

        //Compute grid spacing in graph units
        let scaleMagnitude = Math.log10(scaleFactor);

        /*if(Math.pow(10,(scaleMagnitude % 1)) > 5){
            scaleMagnitude = Math.floor(scaleMagnitude) * Math.log10(5);
        }*/

        const xAxis = toScreenCoordsY(0);
        const yAxis = toScreenCoordsX(0);

        //MINOR GRID LINES ----------
        ctx.lineWidth = 0.5;

        const minorGridScale = minorGridScaleToNiceMultiple(scaleFactor/2);

        const startXMinor = Math.floor(graphLeft / minorGridScale) * minorGridScale;
        const endXMinor   = Math.ceil(graphRight / minorGridScale) * minorGridScale;
        const startYMinor = Math.floor(graphBottom / minorGridScale) * minorGridScale;
        const endYMinor   = Math.ceil(graphTop / minorGridScale) * minorGridScale;

        //Draw minor vertical grid lines
        ctx.beginPath();
        for (let gx = startXMinor; gx <= endXMinor; gx += minorGridScale) {
            const sx = toScreenCoordsX(gx);
            ctx.moveTo(sx, 0);
            ctx.lineTo(sx, window.innerHeight);
        }
        ctx.stroke();

        //Draw minor horizontal grid lines
        ctx.beginPath();
        for (let gy = startYMinor; gy <= endYMinor; gy += minorGridScale) {
            const sy = toScreenCoordsY(gy);
            ctx.moveTo(0, sy);
            ctx.lineTo(window.innerWidth, sy);
        }
        ctx.stroke();

        //MAJOR GRID LINES ----------
        ctx.lineWidth = 1;

        const majorGridScale = majorGridScaleToNiceMultiple(scaleFactor/2);

        const startX = Math.floor(graphLeft / majorGridScale) * majorGridScale;
        const endX   = Math.ceil(graphRight / majorGridScale) * majorGridScale;
        const startY = Math.floor(graphBottom / majorGridScale) * majorGridScale;
        const endY   = Math.ceil(graphTop / majorGridScale) * majorGridScale;

        let labelY = xAxis - 8;
        if(labelY < 20) labelY = 20 ;
        if(labelY > window.innerHeight - 10) labelY = window.innerHeight - 10;

        let labelX = yAxis + 4;
        if(labelX < 10){ labelX = 10};
        if(labelX + 20 > window.innerWidth) labelX = window.innerWidth-20;

        ctx.beginPath();
        ctx.font = "15px Tahoma";

        //Draw vertical grid lines
        for (let gx = startX; gx <= endX; gx += majorGridScale) {
            const sx = toScreenCoordsX(gx);
            ctx.moveTo(sx, 0);
            ctx.lineTo(sx, window.innerHeight);

            let text = Math.round(gx*1_000_000)/1_000_000; //Math.f16round

            ctx.fillText(text, sx+4, labelY);
        }

        ctx.stroke();

        ctx.beginPath();
        ctx.font = "15px Tahoma";

        //Draw horizontal grid lines
        for (let gy = startY; gy <= endY; gy += majorGridScale) {
            const sy = toScreenCoordsY(gy);
            ctx.moveTo(0, sy);
            ctx.lineTo(window.innerWidth, sy);

            let text = Math.round(gy*1_000_000)/1_000_000;

            ctx.fillText(text, labelX, sy-8);
        }

        ctx.stroke();

        //Optionally, draw the main axes thicker

        //CARDINAL GRID LINES
        ctx.beginPath();
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = "#000";
        

        if (yAxis > 0 && yAxis < window.innerWidth) {
            ctx.moveTo(yAxis, 0);
            ctx.lineTo(yAxis, window.innerHeight);
        }else{

        }

        if (xAxis > 0 && xAxis < window.innerHeight) {
            ctx.moveTo(0, xAxis);
            ctx.lineTo(window.innerWidth, xAxis);
        }

        ctx.stroke();
    }

    // Dragging (panning) functionality
    canvas.addEventListener('mousedown', (e) => {
      isDragging = true;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
      canvas.style.cursor = 'grabbing';
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - lastMouseX;
      const dy = e.clientY - lastMouseY;
      offsetX += (dx*(3/window.innerWidth)*1);
      offsetY += (dy*(3/window.innerWidth)*1);
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
      //if(dx == 0 && dy == 0) return;
      update();
    });

    canvas.addEventListener('mouseup', () => {
      isDragging = false;
      canvas.style.cursor = 'grab';
    });

    canvas.addEventListener('mouseleave', () => {
      isDragging = false;
      canvas.style.cursor = 'grab';
    });

    window.addEventListener('resize', update, { passive: true });

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault(); // prevent page scroll

        const zoomSpeed = 1.07; // how fast to zoom
        const mouseGraphX = toGraphCoordsX(e.offsetX);
        const mouseGraphY = toGraphCoordsY(e.offsetY);

        if (e.deltaY < 0) {
            // scroll up = zoom in
            scaleFactor *= zoomSpeed;
            offsetX /= zoomSpeed;
            offsetY /= zoomSpeed;
        } else {
            // scroll down = zoom out
            scaleFactor /= zoomSpeed;
            offsetX *= zoomSpeed;
            offsetY *= zoomSpeed;
        }

        // Optional: zoom centered on mouse position
        // Adjust offsets so the point under the mouse stays fixed in screen space
        /*const newMouseScreenX = toScreenCoordsX(mouseGraphX);
        const newMouseScreenY = toScreenCoordsY(mouseGraphY);
        offsetX += e.offsetX - newMouseScreenX;
        offsetY += e.offsetY - newMouseScreenY;*/

        draw();
    }, { passive: false });

    document.addEventListener("DOMContentLoaded", () => {
      const equationList = document.getElementById('equationList');

      const color = getNextColor();
      console.log('new color: ', color);

      let blankExpression = {
        id: getNextId(),
        type: -1,
        color: color,
        latex: '',
        tokens: [],
        varDependencies: []
      };

      appendExpression(blankExpression);

      equationList.appendChild(generateEquationRow(blankExpression));
      console.log('generated blank',getAllExpressions());

      update();
    });

    resize();
    draw();

    document.getElementById('zoomIn').addEventListener('click', () => {
        scaleFactor /= 1.4142135;
        offsetX *= 1.4142135;
        offsetY *= 1.4142135;
        //console.log('Zoom changed to' + scaleFactor);
        draw();
    });

    document.getElementById('zoomOut').addEventListener('click', () => {
        scaleFactor *= 1.4142135;
        offsetX /= 1.4142135;
        offsetY /= 1.4142135;
        //console.log('Zoom changed to' + scaleFactor);
        draw();
    });
